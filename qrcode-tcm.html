<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码考试 - 中医康复理疗</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'PingFang SC','Microsoft YaHei',sans-serif;
  background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 50%, #fed7aa 100%);
  min-height: 100vh; display:flex; align-items:center; justify-content:center;
  padding: 20px;
}
.card {
  background: #fff;
  border-radius: 20px;
  padding: 40px 30px;
  max-width: 420px;
  width: 100%;
  text-align: center;
  box-shadow: 0 20px 48px rgba(0,0,0,.12);
}
.logo { font-size: 48px; margin-bottom: 8px; }
h1 { font-size: 1.4rem; color: #c2410c; margin-bottom: 4px; }
.sub { font-size: .82rem; color: #64748b; margin-bottom: 24px; }
.qr-wrapper {
  display: inline-block;
  padding: 16px;
  border: 3px solid #f97316;
  border-radius: 16px;
  margin-bottom: 16px;
  background: #fff;
}
.qr-wrapper img { display: block; width: 220px; height: 220px; }
.url-box {
  background: #f1f5f9;
  border-radius: 10px;
  padding: 12px 16px;
  margin: 16px 0;
  word-break: break-all;
  font-family: monospace;
  font-size: .82rem;
  color: #334155;
  user-select: all;
}
.btn {
  display: inline-block;
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: #fff;
  padding: 12px 32px;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 600;
  text-decoration: none;
  box-shadow: 0 4px 14px rgba(249,115,22,.35);
}
.tip { margin-top: 16px; font-size: .78rem; color: #94a3b8; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🏥</div>
  <h1>中医康复理疗在线考试</h1>
  <p class="sub">微信扫码 · 即刻答题</p>
  <div class="qr-wrapper">
    <img id="qrcode" src="" alt="QR Code">
  </div>
  <p style="font-size:.82rem;color:#475569;">📱 <strong>打开微信扫一扫</strong></p>
  <div class="url-box" id="urlBox"></div>
  <a class="btn" id="directLink" href="#" target="_blank">🔗 直接打开</a>
  <div class="tip">共 100 题 · 满分 100 分 · 120 分钟 · 60 分及格</div>
</div>
<script>
const URL = 'https://xt221886.github.io/ggyyys-exam/tcm-exam.html';
document.getElementById('qrcode').src = 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=' + encodeURIComponent(URL);
document.getElementById('urlBox').textContent = URL;
document.getElementById('directLink').href = URL;
</script>
</body>
</html>
