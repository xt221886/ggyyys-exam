<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>公共营养师在线考试</title>
<style>
:root {
  --green-50: #f0fdf4;
  --green-100: #dcfce7;
  --green-200: #bbf7d0;
  --green-300: #86efac;
  --green-400: #4ade80;
  --green-500: #22c55e;
  --green-600: #16a34a;
  --green-700: #15803d;
  --green-800: #166534;
  --green-900: #14532d;
  --amber-400: #fbbf24;
  --amber-500: #f59e0b;
  --red-400: #f87171;
  --red-500: #ef4444;
  --red-600: #dc2626;
  --slate-50: #f8fafc;
  --slate-100: #f1f5f9;
  --slate-200: #e2e8f0;
  --slate-300: #cbd5e1;
  --slate-400: #94a3b8;
  --slate-500: #64748b;
  --slate-600: #475569;
  --slate-700: #334155;
  --slate-800: #1e293b;
  --slate-900: #0f172a;
  --white: #ffffff;
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 4px 14px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
  --shadow-lg: 0 12px 32px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
  --shadow-xl: 0 20px 48px rgba(0,0,0,.16), 0 8px 20px rgba(0,0,0,.08);
  --font-display: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --font-body: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

html { font-size:16px; -webkit-tap-highlight-color:transparent; }
body {
  font-family: var(--font-body);
  background: #f0f9f1;
  color: var(--slate-800);
  min-height: 100vh;
  min-height: 100dvh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── Background Pattern ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(34,197,94,.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(34,197,94,.06) 0%, transparent 60%),
    radial-gradient(circle at 50% 50%, rgba(22,163,74,.03) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── Decorative floating elements ── */
body::after {
  content: '';
  position: fixed;
  top: -120px; right: -80px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(34,197,94,.07) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: floatBg 12s ease-in-out infinite;
}
@keyframes floatBg {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(-30px,20px) scale(1.08); }
  66% { transform: translate(15px,-15px) scale(.94); }
}

/* ── Container ── */
.app-container {
  position: relative;
  z-index: 1;
  max-width: 520px;
  margin: 0 auto;
  padding: 16px;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ── Cards ── */
.card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 24px 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--slate-100);
  transition: all .3s ease;
}

/* ── Header ── */
.app-header {
  text-align: center;
  padding: 28px 16px 20px;
  position: relative;
}
.app-logo {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--green-500), var(--green-600));
  border-radius: 16px;
  margin-bottom: 12px;
  box-shadow: 0 8px 24px rgba(34,197,94,.3);
  font-size: 28px;
  animation: logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse {
  0%,100% { box-shadow: 0 8px 24px rgba(34,197,94,.3); }
  50% { box-shadow: 0 8px 36px rgba(34,197,94,.45); }
}
.app-title {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--slate-900);
  letter-spacing: .02em;
}
.app-subtitle {
  font-size: .85rem;
  color: var(--slate-500);
  margin-top: 4px;
}

/* ── Form ── */
.form-group { margin-bottom: 18px; }
.form-label {
  display: block;
  font-size: .88rem;
  font-weight: 600;
  color: var(--slate-700);
  margin-bottom: 6px;
}
.form-label .required { color: var(--red-500); margin-left: 2px; }
.form-input {
  width: 100%;
  height: 48px;
  border: 2px solid var(--slate-200);
  border-radius: var(--radius);
  padding: 0 14px;
  font-size: 1rem;
  font-family: var(--font-body);
  color: var(--slate-800);
  background: var(--slate-50);
  transition: all .2s ease;
  outline: none;
  -webkit-appearance: none;
}
.form-input:focus {
  border-color: var(--green-500);
  background: var(--white);
  box-shadow: 0 0 0 4px rgba(34,197,94,.1);
}
.form-input.error {
  border-color: var(--red-400);
  background: #fef2f2;
}
.form-error {
  font-size: .78rem;
  color: var(--red-500);
  margin-top: 4px;
  display: none;
}
.form-error.show { display: block; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 50px;
  padding: 0 28px;
  border: none;
  border-radius: var(--radius);
  font-size: 1rem;
  font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all .25s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  position: relative;
  overflow: hidden;
}
.btn:active { transform: scale(.97); }
.btn-primary {
  width: 100%;
  background: linear-gradient(135deg, var(--green-500), var(--green-600));
  color: #fff;
  box-shadow: 0 4px 14px rgba(34,197,94,.35);
  font-size: 1.05rem;
  letter-spacing: .04em;
}
.btn-primary:hover { box-shadow: 0 6px 20px rgba(34,197,94,.45); transform: translateY(-1px); }
.btn-primary:active { transform: scale(.97) translateY(0); }
.btn-outline {
  background: var(--white);
  color: var(--green-700);
  border: 2px solid var(--green-300);
}
.btn-outline:hover { background: var(--green-50); border-color: var(--green-500); }
.btn-sm { height: 38px; padding: 0 16px; font-size: .85rem; border-radius: var(--radius-sm); }
.btn-submit {
  width: 100%;
  background: linear-gradient(135deg, var(--green-500), var(--green-600));
  color: #fff;
  box-shadow: 0 4px 14px rgba(34,197,94,.35);
  font-size: 1.05rem;
  letter-spacing: .04em;
  margin-top: 8px;
}

/* ── Timer Bar ── */
.timer-bar-wrap {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--white);
  padding: 12px 16px;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  gap: 12px;
  margin: -16px -16px 16px;
  border-bottom: 1px solid var(--slate-100);
}
.timer-icon {
  font-size: 1.4rem;
  flex-shrink: 0;
}
.timer-info {
  flex: 1;
  min-width: 0;
}
.timer-label {
  font-size: .72rem;
  color: var(--slate-500);
  text-transform: uppercase;
  letter-spacing: .05em;
}
.timer-display {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--slate-900);
}
.timer-display.warning { color: var(--amber-500); animation: blink 1s infinite; }
.timer-display.danger { color: var(--red-500); animation: blink .5s infinite; }
@keyframes blink { 50% { opacity: .4; } }
.timer-progress-wrap {
  flex-shrink: 0;
  width: 52px; height: 52px;
  position: relative;
}
.timer-progress-ring {
  transform: rotate(-90deg);
  width: 52px; height: 52px;
}
.timer-progress-ring circle {
  fill: none;
  stroke-width: 4;
  stroke-linecap: round;
  transition: stroke-dashoffset .5s ease, stroke .3s ease;
}
.timer-ring-bg { stroke: var(--slate-100); }
.timer-ring-fg { stroke: var(--green-500); }
.timer-ring-fg.warning { stroke: var(--amber-500); }
.timer-ring-fg.danger { stroke: var(--red-500); }
.timer-percent {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .75rem;
  font-weight: 700;
  color: var(--slate-600);
}

/* ── Progress bar ── */
.progress-bar-wrap {
  background: var(--slate-100);
  border-radius: 99px;
  height: 6px;
  margin-bottom: 20px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green-500), var(--green-400));
  border-radius: 99px;
  transition: width .4s ease;
}

/* ── Question Card ── */
.question-number {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--green-50);
  color: var(--green-700);
  font-size: .8rem;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 99px;
  margin-bottom: 12px;
}
.question-text {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--slate-900);
  line-height: 1.7;
  margin-bottom: 20px;
}
.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.option-item {
  position: relative;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border: 2px solid var(--slate-200);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all .2s ease;
  background: var(--white);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.option-item:active { transform: scale(.985); }
.option-item:hover { border-color: var(--green-300); background: var(--green-50); }
.option-item.selected {
  border-color: var(--green-500);
  background: linear-gradient(135deg, #f0fdf4, #dcfce7);
  box-shadow: 0 0 0 4px rgba(34,197,94,.08);
}
.option-letter {
  flex-shrink: 0;
  width: 36px; height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: var(--slate-100);
  color: var(--slate-600);
  font-weight: 700;
  font-size: .9rem;
  transition: all .2s ease;
}
.option-item.selected .option-letter {
  background: var(--green-500);
  color: #fff;
  box-shadow: 0 4px 12px rgba(34,197,94,.3);
}
.option-text {
  flex: 1;
  font-size: .95rem;
  color: var(--slate-700);
  line-height: 1.5;
}

/* ── Navigation ── */
.nav-buttons {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}
.nav-buttons .btn { flex: 1; }

/* ── Question Grid (quick jump) ── */
.question-grid-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: .85rem;
  color: var(--green-600);
  font-weight: 600;
  cursor: pointer;
  padding: 10px;
  margin-top: 12px;
  user-select: none;
}
.question-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 6px;
  margin-top: 12px;
  padding: 12px;
  background: var(--slate-50);
  border-radius: var(--radius);
  max-height: 0;
  overflow: hidden;
  transition: all .35s ease;
  opacity: 0;
}
.question-grid.open { max-height: 400px; opacity: 1; padding: 12px; }
.grid-dot {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  font-size: .7rem;
  font-weight: 700;
  cursor: pointer;
  background: var(--white);
  border: 1.5px solid var(--slate-200);
  color: var(--slate-500);
  transition: all .15s ease;
  -webkit-tap-highlight-color: transparent;
}
.grid-dot.answered { background: var(--green-100); border-color: var(--green-300); color: var(--green-700); }
.grid-dot.current { background: var(--green-500); border-color: var(--green-500); color: #fff; box-shadow: 0 2px 8px rgba(34,197,94,.4); }

/* ── Results Page ── */
.result-icon {
  font-size: 64px;
  text-align: center;
  margin-bottom: 8px;
  animation: resultBounce .6s ease-out;
}
@keyframes resultBounce {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}
.result-score {
  text-align: center;
  font-family: var(--font-display);
  font-size: 3.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--green-600), var(--green-400));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
}
.result-score.fail {
  background: linear-gradient(135deg, var(--red-500), var(--amber-500));
  -webkit-background-clip: text;
  background-clip: text;
}
.result-label { text-align: center; font-size: .9rem; color: var(--slate-500); margin-top: 4px; }
.result-grade {
  text-align: center;
  font-size: 1.2rem;
  font-weight: 700;
  margin-top: 8px;
  padding: 8px 20px;
  border-radius: 99px;
  display: inline-block;
}
.result-grade.pass { background: var(--green-100); color: var(--green-700); }
.result-grade.fail { background: #fef2f2; color: var(--red-600); }

.result-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 20px;
  text-align: center;
}
.result-stat {
  background: var(--slate-50);
  border-radius: var(--radius);
  padding: 14px 8px;
}
.result-stat-val { font-size: 1.4rem; font-weight: 700; color: var(--slate-900); }
.result-stat-label { font-size: .72rem; color: var(--slate-500); margin-top: 2px; }

/* ── Page Stack ── */
.page { display: none; flex: 1; flex-direction: column; }
.page.active { display: flex; }
.page.centered { justify-content: center; }

/* ── Footer ── */
.app-footer {
  text-align: center;
  padding: 20px 16px;
  font-size: .75rem;
  color: var(--slate-400);
}

/* ── Toast ── */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--slate-900);
  color: #fff;
  padding: 10px 20px;
  border-radius: 99px;
  font-size: .85rem;
  font-weight: 600;
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s ease;
}
.toast.show { opacity: 1; }

/* ── Submit confirm modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.5);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s ease;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal-box {
  background: var(--white);
  border-radius: var(--radius-xl);
  padding: 28px 24px;
  margin: 20px;
  max-width: 360px;
  width: 100%;
  text-align: center;
  box-shadow: var(--shadow-xl);
  transform: translateY(20px);
  transition: transform .3s ease;
}
.modal-overlay.show .modal-box { transform: translateY(0); }
.modal-title { font-size: 1.1rem; font-weight: 700; color: var(--slate-900); margin-bottom: 8px; }
.modal-desc { font-size: .88rem; color: var(--slate-500); margin-bottom: 20px; line-height: 1.5; }
.modal-buttons { display: flex; gap: 10px; }
.modal-buttons .btn { flex: 1; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--slate-300); border-radius: 99px; }

@media (max-width: 380px) {
  .card { padding: 18px 14px; }
  .app-title { font-size: 1.3rem; }
  .question-text { font-size: .98rem; }
  .option-item { padding: 12px 14px; }
  .question-grid { grid-template-columns: repeat(8, 1fr); }
}
</style>
</head>
<body>

<div class="app-container" id="app">

  <!-- ═══════════ PAGE 1: LOGIN ═══════════ -->
  <div class="page active centered" id="page-login">
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
      <div class="app-header">
        <div class="app-logo">🥗</div>
        <h1 class="app-title">公共营养师在线考试</h1>
        <p class="app-subtitle">National Public Nutritionist Exam Simulation</p>
      </div>
      <div class="card">
        <div class="form-group">
          <label class="form-label">姓  名 <span class="required">*</span></label>
          <input class="form-input" id="inputName" type="text" placeholder="请输入您的真实姓名" maxlength="30" autocomplete="name">
          <div class="form-error" id="errName">请输入姓名</div>
        </div>
        <div class="form-group">
          <label class="form-label">身份证号 <span class="required">*</span></label>
          <input class="form-input" id="inputId" type="text" placeholder="请输入18位身份证号码" maxlength="18" autocomplete="off">
          <div class="form-error" id="errId">请输入正确的18位身份证号</div>
        </div>
        <button class="btn btn-primary" onclick="startExam()">开 始 考 试</button>
      </div>
      <div style="text-align:center;margin-top:16px;font-size:.8rem;color:var(--slate-400);">
        📋 共 100 题 · 满分 100 分 · 考试时间 120 分钟<br>
        及格线 60 分 · 全部为单项选择题
      </div>
    </div>
    <div class="app-footer">公共营养师在线考试系统 © 2026</div>
  </div>

  <!-- ═══════════ PAGE 2: EXAM ═══════════ -->
  <div class="page" id="page-exam">
    <!-- Timer -->
    <div class="timer-bar-wrap" id="timerBar">
      <span class="timer-icon">⏱️</span>
      <div class="timer-info">
        <div class="timer-label">剩余时间</div>
        <div class="timer-display" id="timerDisplay">120:00</div>
      </div>
      <div class="timer-progress-wrap">
        <svg class="timer-progress-ring" viewBox="0 0 52 52">
          <circle class="timer-ring-bg" cx="26" cy="26" r="22"/>
          <circle class="timer-ring-fg" id="timerRing" cx="26" cy="26" r="22"
            stroke-dasharray="138.23" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-percent" id="timerPercent">100%</div>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>

    <!-- Question Card -->
    <div class="card" style="flex:1;">
      <div class="question-number" id="qNumber">第 1 题</div>
      <div class="question-text" id="qText"></div>
      <div class="options-list" id="optionsList"></div>
      <div class="nav-buttons">
        <button class="btn btn-outline btn-sm" id="btnPrev" onclick="prevQuestion()">◀ 上一题</button>
        <button class="btn btn-outline btn-sm" id="btnNext" onclick="nextQuestion()">下一题 ▶</button>
      </div>

      <!-- Question grid toggle -->
      <div class="question-grid-toggle" onclick="toggleGrid()">
        <span id="gridToggleIcon">📋</span> <span id="gridToggleText">答题卡</span>
      </div>
      <div class="question-grid" id="questionGrid"></div>

      <button class="btn btn-submit" style="margin-top:16px;" onclick="showSubmitConfirm()">
        ✅ 交卷
      </button>
    </div>
  </div>

  <!-- ═══════════ PAGE 3: SUBMITTED ═══════════ -->
  <div class="page centered" id="page-results">
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
      <div class="card" style="text-align:center;">
        <div style="font-size:64px;margin-bottom:12px;" id="resultIcon">✅</div>
        <div style="font-size:1.3rem;font-weight:700;color:#166534;margin-bottom:4px;">考试已提交</div>
        <div style="font-size:.9rem;color:#64748b;margin-bottom:20px;" id="resultMsg">您的答卷已成功提交，成绩将在后台审核后公布。</div>
        <div style="background:#f0fdf4;border-radius:12px;padding:16px;margin-bottom:16px;text-align:left;font-size:.82rem;color:#475569;line-height:1.6;">
          📋 <strong>考生信息</strong><br>
          <span id="submittedName" style="color:#94a3b8;">—</span><br>
          ⏱️ <span id="submittedTime" style="color:#94a3b8;">—</span>
        </div>
        <button class="btn btn-primary" style="margin-top:4px;" onclick="restartExam()">🔄 重新考试</button>

function validateId(id) {
  if (id.length !== 18) return false;
  const weights = [7,9,10,5,8,4,2,1,6,3,7,9,10,5,8,4,2];
  const checkCodes = '10X98765432';
  let sum = 0;
  for (let i = 0; i < 17; i++) {
    if (isNaN(parseInt(id[i]))) return false;
    sum += parseInt(id[i]) * weights[i];
  }
  const expected = checkCodes[sum % 11];
  const actual = id[17].toUpperCase();
  return expected === actual;
}

  const idInput = $('inputId');
  const errName = $('errName');
  const errId = $('errId');
  let valid = true;

  const name = nameInput.value.trim();
  if (!name) {
    errName.classList.add('show');
    nameInput.classList.add('error');
    valid = false;
  } else {
    errName.classList.remove('show');
    nameInput.classList.remove('error');
  }

  const id = idInput.value.trim();
  if (!id || !validateId(id)) {
    errId.classList.add('show');
    idInput.classList.add('error');
    valid = false;
  } else {
    errId.classList.remove('show');
    idInput.classList.remove('error');
  }

  if (!valid) return;

  state.studentName = name;
  state.studentId = id;
  state.answers = new Array(100).fill(-1);
  state.currentIndex = 0;
  state.timeLeft = TOTAL_TIME;
  state.submitted = false;
  state.startTime = Date.now();

  showPage(pageExam);
  renderQuestion();
  renderQuestionGrid();
  startTimer();
  updateProgress();
  updateNavButtons();
}

// ═══════════════ TIMER ═══════════════
function startTimer() {
  clearInterval(state.timerInterval);
  updateTimerDisplay();
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    updateTimerDisplay();
    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      showToast('⏰ 考试时间到，系统将自动交卷');
      setTimeout(submitExam, 1500);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const mins = Math.floor(state.timeLeft / 60);
  const secs = state.timeLeft % 60;
  const display = $('timerDisplay');
  display.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;

  display.classList.remove('warning', 'danger');
  const pct = state.timeLeft / TOTAL_TIME;
  const ring = $('timerRing');
  ring.style.strokeDashoffset = 138.23 * (1 - pct);
  $('timerPercent').textContent = Math.round(pct * 100) + '%';

  ring.classList.remove('warning', 'danger');
  if (pct < 0.1) {
    display.classList.add('danger');
    ring.classList.add('danger');
  } else if (pct < 0.25) {
    display.classList.add('warning');
    ring.classList.add('warning');
  }
}

// ═══════════════ PROGRESS ═══════════════
function updateProgress() {
  const answered = state.answers.filter(a => a >= 0).length;
  const pct = (answered / 100) * 100;
  $('progressFill').style.width = pct + '%';
}

// ═══════════════ RENDER QUESTION ═══════════════
function renderQuestion() {
  const idx = state.currentIndex;
  const q = QUESTIONS[idx];
  $('qNumber').textContent = `第 ${idx + 1} 题`;
  $('qText').textContent = q.q;

  const letters = ['A','B','C','D'];
  const container = $('optionsList');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option-item' + (state.answers[idx] === i ? ' selected' : '');
    div.innerHTML = `<span class="option-letter">${letters[i]}</span><span class="option-text">${opt}</span>`;
    div.addEventListener('click', () => selectOption(idx, i));
    container.appendChild(div);
  });

  updateNavButtons();
  updateProgress();
  renderQuestionGrid();
}

function selectOption(qIdx, optIdx) {
  if (state.submitted) return;
  state.answers[qIdx] = optIdx;
  // Re-render just the selected state
  const items = $('optionsList').children;
  for (let i = 0; i < items.length; i++) {
    items[i].classList.toggle('selected', i === optIdx);
  }
  updateProgress();
  renderQuestionGrid();
}

// ═══════════════ NAVIGATION ═══════════════
function nextQuestion() {
  if (state.currentIndex < 99) {
    state.currentIndex++;
    renderQuestion();
  }
}

function prevQuestion() {
  if (state.currentIndex > 0) {
    state.currentIndex--;
    renderQuestion();
  }
}

function updateNavButtons() {
  $('btnPrev').style.visibility = state.currentIndex === 0 ? 'hidden' : 'visible';
  $('btnNext').style.visibility = state.currentIndex === 99 ? 'hidden' : 'visible';
}

// ═══════════════ QUESTION GRID ═══════════════
function renderQuestionGrid() {
  const grid = $('questionGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 100; i++) {
    const dot = document.createElement('div');
    dot.className = 'grid-dot';
    if (state.answers[i] >= 0) dot.classList.add('answered');
    if (i === state.currentIndex) dot.classList.add('current');
    dot.textContent = i + 1;
    dot.addEventListener('click', () => {
      state.currentIndex = i;
      renderQuestion();
      // On mobile, scroll to question area
      document.querySelector('.card').scrollIntoView({ behavior: 'smooth' });
    });
    grid.appendChild(dot);
  }
}

let gridOpen = false;
function toggleGrid() {
  gridOpen = !gridOpen;
  const grid = $('questionGrid');
  const icon = $('gridToggleIcon');
  const text = $('gridToggleText');
  if (gridOpen) {
    grid.classList.add('open');
    icon.textContent = '🔼';
    text.textContent = '收起答题卡';
  } else {
    grid.classList.remove('open');
    icon.textContent = '📋';
    text.textContent = '答题卡';
  }
}

// ═══════════════ SUBMIT ═══════════════
function showSubmitConfirm() {
  const answered = state.answers.filter(a => a >= 0).length;
  const unanswered = 100 - answered;
  let desc = `您已完成 ${answered} 题，`;
  if (unanswered > 0) {
    desc += `还有 <strong style="color:#ef4444;">${unanswered}</strong> 题未作答。`;
  } else {
    desc += '所有题目均已作答。';
  }
  desc += '<br>交卷后将无法修改，确定要交卷吗？';
  $('modalDesc').innerHTML = desc;
  $('submitModal').classList.add('show');
}

function hideSubmitConfirm() {
  $('submitModal').classList.remove('show');
}

function submitExam() {
  clearInterval(state.timerInterval);
  state.submitted = true;
  hideSubmitConfirm();

  const totalTimeSec = TOTAL_TIME - state.timeLeft;
  const totalMin = Math.floor(totalTimeSec / 60);
  const totalSec = totalTimeSec % 60;

  let correct = 0, wrong = 0, unanswered = 0;
  for (let i = 0; i < 100; i++) {
    if (state.answers[i] < 0) unanswered++;
    else if (state.answers[i] === QUESTIONS[i].ans) correct++;
    else wrong++;
  }

  const result = {
    name: state.studentName,
    id: state.studentId.substring(0, 4) + '****' + state.studentId.substring(14),
    idFull: state.studentId,
    score: correct,
    correct: correct,
    wrong: wrong,
    unanswered: unanswered,
    answers: state.answers,
    timeUsed: totalTimeSec,
    timeDisplay: `${totalMin}分${totalSec}秒`,
    submittedAt: new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }),
    timestamp: Date.now()
  };

  // Show submitted page
  $('submittedName').textContent = '姓名：' + result.name;
  $('submittedTime').textContent = '用时：' + result.timeDisplay;
  showPage(pageResults);
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Save to GitHub
  saveResult(result);
}

async function saveResult(result) {
  const TOKEN = atob('Z2hvX1dLRlBzOUd6RXZyMmVDY1MxSVBHTUFOaGF1Z3dwdjFkN2RQeg==');
  const REPO = 'xt221886/ggyyys-exam';
  const ts = new Date().toISOString().replace(/[:.]/g, '-');
  const filename = `results/${ts}_${result.name}.json`;

  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${encodeURIComponent(filename)}`, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `答题记录: ${result.name} - ${result.score}分`,
        content: btoa(unescape(encodeURIComponent(JSON.stringify(result, null, 2))))
      })
    });
    if (res.ok) {
      console.log('✅ 成绩已保存');
    } else {
      console.warn('⚠️ 保存失败，已存入本地备份');
      fallbackStore(result);
    }
  } catch (e) {
    console.warn('⚠️ 网络错误，已存入本地备份');
    fallbackStore(result);
  }
}

function fallbackStore(result) {
  const backup = JSON.parse(localStorage.getItem('exam_backup') || '[]');
  backup.push(result);
  localStorage.setItem('exam_backup', JSON.stringify(backup));
}

function restartExam() {
  clearInterval(state.timerInterval);
  state.answers = new Array(100).fill(-1);
  state.currentIndex = 0;
  state.timeLeft = TOTAL_TIME;
  state.submitted = false;
  state.studentName = '';
  state.studentId = '';
  $('inputName').value = '';
  $('inputId').value = '';
  $('errName').classList.remove('show');
  $('inputName').classList.remove('error');
  $('errId').classList.remove('show');
  $('inputId').classList.remove('error');
  gridOpen = false;
  $('questionGrid').classList.remove('open');
  $('gridToggleIcon').textContent = '📋';
  $('gridToggleText').textContent = '答题卡';
  showPage(pageLogin);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════ KEYBOARD SHORTCUTS ═══════════════
document.addEventListener('keydown', (e) => {
  if (state.submitted) return;
  if (!pageExam.classList.contains('active')) return;
  const idx = state.currentIndex;
  switch(e.key.toLowerCase()) {
    case 'a': selectOption(idx, 0); break;
    case 'b': selectOption(idx, 1); break;
    case 'c': selectOption(idx, 2); break;
    case 'd': selectOption(idx, 3); break;
    case 'arrowleft': prevQuestion(); e.preventDefault(); break;
    case 'arrowright': nextQuestion(); e.preventDefault(); break;
  }
});

// ═══════════════ PREVENT ACCIDENTAL CLOSE ═══════════════
window.addEventListener('beforeunload', (e) => {
  if (!state.submitted && pageExam.classList.contains('active')) {
    e.preventDefault();
    e.returnValue = '考试正在进行中，确定要离开吗？';
  }
});
</script>
