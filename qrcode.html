  min-height: 100vh; display:flex; align-items:center; justify-content:center;

.card {

  max-width: 420px;
  width: 100%;

  box-shadow: 0 20px 48px rgba(0,0,0,.12), 0 8px 20px rgba(0,0,0,.06);

.logo { font-size: 48px; margin-bottom: 8px; }
h1 { font-size: 1.4rem; color: #166534; margin-bottom: 4px; }
.sub { font-size: .82rem; color: #64748b; margin-bottom: 24px; }
.qr-wrapper {

.url-box {

  font-family: 'SF Mono','Fira Code','Consolas',monospace;
  font-size: .82rem;
  color: #334155;

.btn {
  display: inline-block;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: #fff;
  padding: 12px 32px;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 600;
  text-decoration: none;
  box-shadow: 0 4px 14px rgba(34,197,94,.35);
  transition: all .2s;
}
.btn:hover { box-shadow: 0 6px 20px rgba(34,197,94,.45); transform: translateY(-1px); }
.tip {
  margin-top: 16px;
  font-size: .78rem;
  color: #94a3b8;
  line-height: 1.6;
}
.note {
  margin-top: 12px;
  padding: 12px;
  background: #fefce8;
  border: 1px solid #fde047;
  border-radius: 10px;
  font-size: .78rem;
  color: #854d0e;
  text-align: left;

</head>
